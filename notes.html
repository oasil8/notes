<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0e0e;
    --bg2:#161616;
    --bg3:#1e1e1e;
    --line:#2a2a2a;
    --line2:#333;
    --text:#e8e8e8;
    --muted:#666;
    --muted2:#888;
    --accent:#e8e8e8;
    --dot:#444;
    --code-bg:#1a1a1a;
    --tag-bg:#1e1e1e;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

  /* ── LIST VIEW ── */
  #list-view{max-width:660px;margin:0 auto;padding:80px 24px 120px}
  #list-view h1{font-size:22px;font-weight:400;letter-spacing:-.3px;margin-bottom:6px;color:var(--text)}
  #list-view .subtitle{font-size:13px;color:var(--muted2);margin-bottom:48px}

  /* upload zone */
  #drop-zone{
    border:1px dashed var(--line2);
    border-radius:6px;
    padding:36px 24px;
    text-align:center;
    cursor:pointer;
    transition:border-color .2s,background .2s;
    margin-bottom:48px;
    position:relative;
  }
  #drop-zone:hover,#drop-zone.drag-over{border-color:var(--muted2);background:var(--bg2)}
  #drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
  #drop-zone .dz-label{font-size:14px;color:var(--muted2);margin-bottom:4px}
  #drop-zone .dz-label strong{color:var(--text);font-weight:500}
  #drop-zone .dz-sub{font-size:12px;color:var(--muted)}

  /* notes list */
  #notes-section{display:none}
  #notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  #notes-header .label{font-size:11px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
  #notes-header .count{font-size:11px;color:var(--muted)}
  #notes-list{}
  .note-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 0;border-bottom:1px solid var(--line);
    cursor:pointer;gap:16px;
    transition:opacity .15s;
  }
  .note-row:first-child{border-top:1px solid var(--line)}
  .note-row:hover{opacity:.7}
  .note-row:hover .note-dot{background:var(--muted2)}
  .nr-left{display:flex;align-items:center;gap:12px;min-width:0}
  .note-dot{width:6px;height:6px;border-radius:50%;background:var(--dot);flex-shrink:0;transition:background .15s}
  .note-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .note-date{font-size:12px;color:var(--muted);flex-shrink:0}

  /* ── DETAIL VIEW ── */
  #detail-view{display:none;max-width:700px;margin:0 auto;padding:48px 24px 120px}
  #back-btn{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12px;color:var(--muted);cursor:pointer;
    border:none;background:none;padding:0;margin-bottom:48px;
    transition:color .15s;
    text-decoration:none;
  }
  #back-btn:hover{color:var(--text)}
  #back-btn::before{content:'←';font-size:13px}
  #detail-date{font-size:12px;color:var(--muted)}
  #detail-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}

  /* rendered markdown */
  .md-body{font-size:15px;line-height:1.8;color:var(--text)}
  .md-body h1{font-size:24px;font-weight:500;margin:0 0 32px;color:var(--text)}
  .md-body h2{font-size:17px;font-weight:500;margin:48px 0 20px;color:var(--text);letter-spacing:-.2px}
  .md-body h3{font-size:14px;font-weight:500;margin:28px 0 12px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em}
  .md-body p{margin:0 0 16px;color:var(--text)}
  .md-body ul,.md-body ol{padding-left:20px;margin:0 0 16px}
  .md-body li{margin-bottom:6px;color:var(--text)}
  .md-body a{color:var(--muted2);text-decoration:underline;text-underline-offset:3px}
  .md-body a:hover{color:var(--text)}
  .md-body code{
    font-family:'SF Mono','Fira Code','Consolas',monospace;
    font-size:12px;background:var(--code-bg);
    border:1px solid var(--line2);padding:2px 6px;border-radius:3px;color:#c9c9c9
  }
  .md-body pre{
    background:var(--code-bg);border:1px solid var(--line);
    border-radius:6px;padding:20px;overflow-x:auto;margin:0 0 20px
  }
  .md-body pre code{background:none;border:none;padding:0;font-size:13px;line-height:1.65;color:#c9c9c9}
  .md-body blockquote{
    border-left:2px solid var(--line2);padding:4px 0 4px 20px;
    margin:0 0 16px;color:var(--muted2);font-style:italic
  }
  .md-body hr{border:none;border-top:1px solid var(--line);margin:40px 0}
  .md-body table{width:100%;border-collapse:collapse;margin:0 0 24px;font-size:13px}
  .md-body thead tr{border-bottom:1px solid var(--line2)}
  .md-body th{
    padding:10px 14px;text-align:left;font-weight:500;
    font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);background:var(--bg2)
  }
  .md-body td{padding:10px 14px;border-bottom:1px solid var(--line);color:var(--text)}
  .md-body tr:last-child td{border-bottom:none}
  /* kbd style for shortcut keys */
  .md-body kbd,.md-body code.shortcut{
    font-family:'SF Mono','Fira Code',monospace;
    font-size:11px;background:var(--bg3);
    border:1px solid var(--line2);border-bottom-width:2px;
    padding:2px 8px;border-radius:4px;color:var(--muted2)
  }
  .md-body img{max-width:100%;border-radius:4px;border:1px solid var(--line)}
  .md-body strong{font-weight:500;color:var(--text)}
  .md-body em{color:var(--muted2)}

  /* hljs overrides */
  .hljs{background:transparent!important;padding:0!important}
  .hljs-keyword{color:#7a8fcc}
  .hljs-string{color:#8fbb8f}
  .hljs-comment{color:#555}
  .hljs-number{color:#b5a97a}
  .hljs-function,.hljs-title{color:#c4a26f}
  .hljs-built_in{color:#8ab}
  .hljs-variable,.hljs-attr{color:#bbb}

  /* delete button on note row */
  .note-row{position:relative}
  .del-btn{
    display:flex;align-items:center;justify-content:center;
    width:24px;height:24px;border-radius:4px;
    border:none;background:none;cursor:pointer;
    color:var(--muted);flex-shrink:0;
    opacity:0;transition:opacity .15s,color .15s,background .15s;
    font-size:14px;line-height:1;
  }
  .note-row:hover .del-btn{opacity:1}
  .del-btn:hover{color:#c0392b;background:rgba(192,57,43,.1)}

  /* undo toast */
  #undo-toast{
    position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(12px);
    background:var(--bg3);border:1px solid var(--line2);border-radius:6px;
    padding:10px 16px;display:flex;align-items:center;gap:14px;
    font-size:13px;color:var(--muted2);
    opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
    white-space:nowrap;z-index:100;
  }
  #undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #undo-toast button{
    border:none;background:none;cursor:pointer;
    font-size:13px;color:var(--text);font-weight:500;padding:0;
  }
  #undo-toast button:hover{text-decoration:underline}

  /* empty state inside list */
  #empty-hint{text-align:center;padding:48px 0;color:var(--muted);font-size:13px;display:none}
</style>
</head>
<body>

<!-- LIST VIEW -->
<div id="list-view">
  <h1>notes</h1>
  <p class="subtitle">마크다운 파일을 올려 노트를 쌓아가세요</p>

  <div id="drop-zone">
    <input type="file" id="file-input" accept=".md,.txt" multiple>
    <p class="dz-label"><strong>파일 선택</strong> 또는 여기에 드래그</p>
    <p class="dz-sub">.md · .txt 지원</p>
  </div>

  <div id="notes-section">
    <div id="notes-header">
      <span class="label">NOTES</span>
      <span class="count" id="note-count">0</span>
    </div>
    <div id="notes-list"></div>
  </div>
  <p id="empty-hint">아직 노트가 없습니다</p>
</div>

<!-- UNDO TOAST -->
<div id="undo-toast">
  <span id="undo-msg">노트를 삭제했습니다</span>
  <button onclick="undoDelete()">실행 취소</button>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view">
  <div id="detail-meta">
    <button id="back-btn" onclick="showList()"> 전체 노트</button>
    <span id="detail-date"></span>
  </div>
  <div class="md-body" id="detail-content"></div>
</div>

// ── State ──
let notes = [...BUILT_IN];

// ── Init ──
marked.setOptions({ gfm: true, breaks: true });

function formatDate(d) {
  const date = new Date(d || Date.now());
  return date.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'-').replace('.','');
}

function renderList() {
  const list = document.getElementById('notes-list');
  const section = document.getElementById('notes-section');
  const empty = document.getElementById('empty-hint');
  document.getElementById('note-count').textContent = notes.length;

  if (notes.length === 0) {
    section.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  section.style.display = 'block';
  empty.style.display = 'none';
  list.innerHTML = '';
  notes.forEach((n, i) => {
    const row = document.createElement('div');
    row.className = 'note-row';
    row.innerHTML = `
      <div class="nr-left">
        <span class="note-dot"></span>
        <span class="note-name">${escHtml(n.name)}</span>
      </div>
      <span class="note-date" style="margin-right:8px">${n.date || ''}</span>
      <button class="del-btn" title="삭제" aria-label="노트 삭제">✕</button>
    `;
    row.querySelector('.del-btn').addEventListener('click', e => {
      e.stopPropagation();
      deleteNote(i);
    });
    row.addEventListener('click', () => showNote(i));
    list.appendChild(row);
  });
}

function showNote(i) {
  const n = notes[i];
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-date').textContent = n.date || '';
  const html = marked.parse(n.content);
  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-content').querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  window.scrollTo(0,0);
}

function showList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function readFile(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => resolve({
      name: file.name.replace(/\.md$|\.txt$/,''),
      date: new Date().toISOString().slice(0,10),
      content: e.target.result
    });
    r.readAsText(file, 'UTF-8');
  });
}

async function addFiles(files) {
  for (const f of files) {
    const note = await readFile(f);
    notes.unshift(note);
  }
  renderList();
}

// ── Delete & Undo ──
let _deletedNote = null;
let _deletedIdx  = null;
let _toastTimer  = null;

function deleteNote(i) {
  _deletedNote = notes[i];
  _deletedIdx  = i;
  notes.splice(i, 1);
  renderList();
  showToast(`"${_deletedNote.name}" 삭제됨`);
}

function showToast(msg) {
  const toast = document.getElementById('undo-toast');
  document.getElementById('undo-msg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => {
    toast.classList.remove('show');
    _deletedNote = null;
  }, 4000);
}

function undoDelete() {
  if (!_deletedNote) return;
  notes.splice(_deletedIdx, 0, _deletedNote);
  _deletedNote = null;
  clearTimeout(_toastTimer);
  document.getElementById('undo-toast').classList.remove('show');
  renderList();
}

// ── Events ──
document.getElementById('file-input').addEventListener('change', e => {
  addFiles([...e.target.files]);
  e.target.value = '';
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files].filter(f => f.name.match(/\.(md|txt)$/)));
});

// ── Boot ──
renderList();
</script>
