<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;
    --line:#2a2a2a;--line2:#333;
    --text:#e8e8e8;--muted:#666;--muted2:#888;
    --dot:#444;--code-bg:#1a1a1a;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

  /* LIST */
  #list-view{max-width:660px;margin:0 auto;padding:80px 24px 120px}
  #list-view h1{font-size:22px;font-weight:400;letter-spacing:-.3px;margin-bottom:6px}
  #list-view .subtitle{font-size:13px;color:var(--muted2);margin-bottom:40px}

  /* drop zone */
  #drop-zone{
    border:1px dashed var(--line2);border-radius:6px;
    padding:28px 24px;text-align:center;cursor:pointer;
    transition:border-color .2s,background .2s;
    margin-bottom:40px;position:relative;
  }
  #drop-zone:hover,#drop-zone.drag-over{border-color:var(--muted2);background:var(--bg2)}
  #drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  #drop-zone .dz-label{font-size:13px;color:var(--muted2);margin-bottom:3px}
  #drop-zone .dz-label strong{color:var(--text);font-weight:500}
  #drop-zone .dz-sub{font-size:11px;color:var(--muted)}

  /* loading / error */
  #status{text-align:center;padding:32px 0;font-size:13px;color:var(--muted)}
  .spinner{display:inline-block;width:16px;height:16px;border:1.5px solid var(--line2);border-top-color:var(--muted2);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:-3px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* section headers */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:32px}
  .section-header:first-of-type{margin-top:0}
  .section-label{font-size:11px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
  .section-count{font-size:11px;color:var(--muted)}

  /* notes list */
  .notes-list{margin-bottom:8px}
  .note-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 0;border-bottom:1px solid var(--line);
    cursor:pointer;gap:12px;transition:opacity .15s;position:relative;
  }
  .note-row:first-child{border-top:1px solid var(--line)}
  .note-row:hover{opacity:.7}
  .note-row:hover .note-dot{background:var(--muted2)}
  .nr-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
  .note-dot{width:6px;height:6px;border-radius:50%;background:var(--dot);flex-shrink:0;transition:background .15s}
  .note-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge-local{font-size:10px;color:var(--muted);border:1px solid var(--line2);border-radius:3px;padding:1px 5px;flex-shrink:0}
  .note-date{font-size:12px;color:var(--muted);flex-shrink:0;margin-right:4px}
  .del-btn{
    display:flex;align-items:center;justify-content:center;
    width:24px;height:24px;border-radius:4px;
    border:none;background:none;cursor:pointer;
    color:var(--muted);flex-shrink:0;
    opacity:0;transition:opacity .15s,color .15s,background .15s;font-size:14px;
  }
  .note-row:hover .del-btn{opacity:1}
  .del-btn:hover{color:#c0392b;background:rgba(192,57,43,.1)}

  /* refresh btn */
  #refresh-btn{
    border:none;background:none;cursor:pointer;color:var(--muted);
    font-size:11px;display:flex;align-items:center;gap:5px;padding:0;
    transition:color .15s;
  }
  #refresh-btn:hover{color:var(--text)}

  /* DETAIL */
  #detail-view{display:none;max-width:700px;margin:0 auto;padding:48px 24px 120px}
  #back-btn{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12px;color:var(--muted);cursor:pointer;
    border:none;background:none;padding:0;margin-bottom:48px;
    transition:color .15s;
  }
  #back-btn::before{content:'←';font-size:13px}
  #back-btn:hover{color:var(--text)}
  #detail-date{font-size:12px;color:var(--muted)}
  #detail-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
  #detail-loading{text-align:center;padding:48px 0;font-size:13px;color:var(--muted);display:none}

  /* markdown */
  .md-body{font-size:15px;line-height:1.8;color:var(--text)}
  .md-body h1{font-size:24px;font-weight:500;margin:0 0 32px}
  .md-body h2{font-size:17px;font-weight:500;margin:48px 0 20px;letter-spacing:-.2px}
  .md-body h3{font-size:14px;font-weight:500;margin:28px 0 12px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em}
  .md-body p{margin:0 0 16px}
  .md-body ul,.md-body ol{padding-left:20px;margin:0 0 16px}
  .md-body li{margin-bottom:6px}
  .md-body a{color:var(--muted2);text-decoration:underline;text-underline-offset:3px}
  .md-body a:hover{color:var(--text)}
  .md-body code{font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:12px;background:var(--code-bg);border:1px solid var(--line2);padding:2px 6px;border-radius:3px;color:#c9c9c9}
  .md-body pre{background:var(--code-bg);border:1px solid var(--line);border-radius:6px;padding:20px;overflow-x:auto;margin:0 0 20px}
  .md-body pre code{background:none;border:none;padding:0;font-size:13px;line-height:1.65;color:#c9c9c9}
  .md-body blockquote{border-left:2px solid var(--line2);padding:4px 0 4px 20px;margin:0 0 16px;color:var(--muted2);font-style:italic}
  .md-body hr{border:none;border-top:1px solid var(--line);margin:40px 0}
  .md-body table{width:100%;border-collapse:collapse;margin:0 0 24px;font-size:13px}
  .md-body thead tr{border-bottom:1px solid var(--line2)}
  .md-body th{padding:10px 14px;text-align:left;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--bg2)}
  .md-body td{padding:10px 14px;border-bottom:1px solid var(--line)}
  .md-body tr:last-child td{border-bottom:none}
  .md-body strong{font-weight:500}
  .md-body em{color:var(--muted2)}
  .md-body img{max-width:100%;border-radius:4px;border:1px solid var(--line)}

  /* hljs */
  .hljs{background:transparent!important;padding:0!important}
  .hljs-keyword{color:#7a8fcc}.hljs-string{color:#8fbb8f}
  .hljs-comment{color:#555}.hljs-number{color:#b5a97a}
  .hljs-function,.hljs-title{color:#c4a26f}
  .hljs-built_in{color:#8ab}.hljs-variable,.hljs-attr{color:#bbb}

  /* undo toast */
  #undo-toast{
    position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(12px);
    background:var(--bg3);border:1px solid var(--line2);border-radius:6px;
    padding:10px 16px;display:flex;align-items:center;gap:14px;
    font-size:13px;color:var(--muted2);
    opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
    white-space:nowrap;z-index:100;
  }
  #undo-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #undo-toast button{border:none;background:none;cursor:pointer;font-size:13px;color:var(--text);font-weight:500;padding:0}
  #undo-toast button:hover{text-decoration:underline}
</style>
</head>
<body>

<!-- LIST VIEW -->
<div id="list-view">
  <h1>notes</h1>
  <p class="subtitle">oasil8/notes · notes/ 폴더의 마크다운 파일</p>

  <!-- 로컬 파일 업로드 -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".md,.txt,.ipynb" multiple>
    <p class="dz-label"><strong>파일 선택</strong> 또는 여기에 드래그</p>
    <p class="dz-sub">.md · .txt · .ipynb 지원</p>
  </div>

  <!-- GitHub 노트 섹션 -->
  <div id="github-section">
    <div class="section-header">
      <span class="section-label">GITHUB</span>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="section-count" id="github-count">0</span>
        <button id="refresh-btn" onclick="loadFromGitHub()">↺ 새로고침</button>
      </div>
    </div>
    <div id="status"><span class="spinner"></span>불러오는 중...</div>
    <div class="notes-list" id="github-list"></div>
  </div>

  <!-- 로컬 노트 섹션 -->
  <div id="local-section" style="display:none">
    <div class="section-header">
      <span class="section-label">LOCAL</span>
      <span class="section-count" id="local-count">0</span>
    </div>
    <div class="notes-list" id="local-list"></div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view">
  <div id="detail-meta">
    <button id="back-btn" onclick="showList()"> 전체 노트</button>
    <span id="detail-date"></span>
  </div>
  <div id="detail-loading"><span class="spinner"></span>불러오는 중...</div>
  <div class="md-body" id="detail-content"></div>
</div>

<!-- UNDO TOAST -->
<div id="undo-toast">
  <span id="undo-msg"></span>
  <button onclick="undoDelete()">실행 취소</button>
</div>

<script>
const GITHUB_USER = 'oasil8';
const GITHUB_REPO = 'notes';
const NOTES_FOLDER = 'notes';

const API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${NOTES_FOLDER}`;
const RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${NOTES_FOLDER}`;

marked.setOptions({ gfm: true, breaks: true });

let githubNotes = [];
let localNotes  = [];
let _deletedNote = null, _deletedFrom = null, _deletedIdx = null, _toastTimer = null;

// ── GitHub 로드 ──
async function loadFromGitHub() {
  setStatus('<span class="spinner"></span>불러오는 중...');
  document.getElementById('github-list').innerHTML = '';
  document.getElementById('github-count').textContent = '0';

  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`GitHub API 오류 ${res.status}`);
    const files = await res.json();

    githubNotes = files
      .filter(f => /\.(md|txt|ipynb)$/.test(f.name))
      .map(f => ({
        name: f.name.replace(/\.(md|txt|ipynb)$/, '').replace(/-/g, ' '),
        filename: f.name,
        date: '',
        content: null,
        source: 'github',
        type: f.name.endsWith('.ipynb') ? 'ipynb' : 'md'
      }));

    await Promise.all(githubNotes.map(async n => {
      try {
        const r = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/commits?path=${NOTES_FOLDER}/${n.filename}&per_page=1`);
        const c = await r.json();
        if (c[0]) n.date = new Date(c[0].commit.author.date).toISOString().slice(0,10);
      } catch(e){}
    }));

    setStatus('');
    renderGithubList();
  } catch(e) {
    setStatus(`<span style="color:#c0392b">⚠ ${e.message}</span>`);
  }
}

function setStatus(html) {
  const el = document.getElementById('status');
  el.innerHTML = html;
  el.style.display = html ? 'block' : 'none';
}

// ── 렌더링 ──
function renderGithubList() {
  const list = document.getElementById('github-list');
  document.getElementById('github-count').textContent = githubNotes.length;
  list.innerHTML = '';
  githubNotes.forEach((n, i) => {
    list.appendChild(makeRow(n, i, 'github'));
  });
}

function renderLocalList() {
  const list = document.getElementById('local-list');
  const section = document.getElementById('local-section');
  document.getElementById('local-count').textContent = localNotes.length;
  list.innerHTML = '';
  if (localNotes.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  localNotes.forEach((n, i) => {
    list.appendChild(makeRow(n, i, 'local'));
  });
}

function makeRow(n, i, from) {
  const row = document.createElement('div');
  row.className = 'note-row';
  row.innerHTML = `
    <div class="nr-left">
      <span class="note-dot"></span>
      <span class="note-name">${escHtml(n.name)}</span>
      ${from === 'local' ? '<span class="badge-local">local</span>' : ''}
    </div>
    <span class="note-date">${n.date || ''}</span>
    <button class="del-btn" title="목록에서 숨기기">✕</button>
  `;
  row.querySelector('.del-btn').addEventListener('click', e => {
    e.stopPropagation();
    deleteNote(i, from);
  });
  row.addEventListener('click', () => showNote(n));
  return row;
}

// ── 상세 보기 ──
async function showNote(n) {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-date').textContent = n.date || '';
  document.getElementById('detail-content').innerHTML = '';
  document.getElementById('detail-loading').style.display = 'block';
  window.scrollTo(0, 0);

  try {
    if (!n.content) {
      if (n.source === 'github') {
        const res = await fetch(`${RAW}/${n.filename}`);
        if (!res.ok) throw new Error('파일을 불러올 수 없습니다');
        const raw = await res.text();
        if (n.type === 'ipynb') {
          const nb = JSON.parse(raw);
          const cells = nb.cells || nb.worksheets?.[0]?.cells || [];
          n.content = cells
            .filter(c => c.cell_type === 'markdown')
            .map(c => Array.isArray(c.source) ? c.source.join('') : c.source)
            .join('\n\n');
          if (!n.content.trim()) n.content = '> 마크다운 셀이 없습니다.';
        } else {
          n.content = raw;
        }
      }
    }
    document.getElementById('detail-loading').style.display = 'none';
    document.getElementById('detail-content').innerHTML = marked.parse(n.content);
    document.getElementById('detail-content').querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  } catch(e) {
    document.getElementById('detail-loading').style.display = 'none';
    document.getElementById('detail-content').innerHTML = `<p style="color:#c0392b">⚠ ${e.message}</p>`;
  }
}

function showList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

// ── 로컬 파일 읽기 ──
function readFile(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => {
      const isIpynb = file.name.endsWith('.ipynb');
      let content = e.target.result;
      if (isIpynb) {
        try {
          const nb = JSON.parse(content);
          const cells = nb.cells || nb.worksheets?.[0]?.cells || [];
          content = cells
            .filter(c => c.cell_type === 'markdown')
            .map(c => Array.isArray(c.source) ? c.source.join('') : c.source)
            .join('\n\n');
          if (!content.trim()) content = '> 마크다운 셀이 없습니다.';
        } catch(e) { content = '> ipynb 파싱 오류'; }
      }
      resolve({
        name: file.name.replace(/\.(md|txt|ipynb)$/, ''),
        filename: file.name,
        date: new Date().toISOString().slice(0,10),
        content,
        source: 'local',
        type: isIpynb ? 'ipynb' : 'md'
      });
    };
    r.readAsText(file, 'UTF-8');
  });
}

async function addLocalFiles(files) {
  for (const f of files) {
    const note = await readFile(f);
    localNotes.unshift(note);
  }
  renderLocalList();
}

// ── 삭제 & Undo ──
function deleteNote(i, from) {
  const arr = from === 'github' ? githubNotes : localNotes;
  _deletedNote = arr[i];
  _deletedFrom = from;
  _deletedIdx  = i;
  arr.splice(i, 1);
  from === 'github' ? renderGithubList() : renderLocalList();
  showToast(`"${_deletedNote.name}" 숨김`);
}

function showToast(msg) {
  const toast = document.getElementById('undo-toast');
  document.getElementById('undo-msg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { toast.classList.remove('show'); _deletedNote = null; }, 4000);
}

function undoDelete() {
  if (!_deletedNote) return;
  const arr = _deletedFrom === 'github' ? githubNotes : localNotes;
  arr.splice(_deletedIdx, 0, _deletedNote);
  _deletedNote = null;
  clearTimeout(_toastTimer);
  document.getElementById('undo-toast').classList.remove('show');
  _deletedFrom === 'github' ? renderGithubList() : renderLocalList();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 이벤트 ──
document.getElementById('file-input').addEventListener('change', e => {
  addLocalFiles([...e.target.files]);
  e.target.value = '';
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  addLocalFiles([...e.dataTransfer.files].filter(f => /\.(md|txt|ipynb)$/.test(f.name)));
});

// ── Boot ──
loadFromGitHub();
</script>
</body>
</html>
